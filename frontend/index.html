<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مراجعة القرآن - Pro Edition</title>
    <meta name="description" content="تطبيق احترافي لحفظ ومراجعة القرآن الكريم">

    <!-- PWA -->
    <meta name="theme-color" content="#2d5016">
    <link rel="manifest" href="manifest.json">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // Enregistrer le plugin ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);

        // Masquer l'écran de chargement avec animation GSAP
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loading-screen');
            if (!loadingScreen) return;
            gsap.to(loadingScreen, {
                opacity: 0,
                duration: 0.4,
                onComplete: () => {
                    loadingScreen.classList.add('hidden');
                    loadingScreen.style.display = 'none';
                    initAnimations();
                }
            });
        }

        // Animer la barre de progression au chargement complet
        window.addEventListener('load', () => {
            gsap.to('#loading-progress', {
                width: '100%',
                duration: 1.0,
                ease: 'power2.inOut',
                onComplete: () => setTimeout(hideLoadingScreen, 300)
            });
        });

        // Fallback: masquer après 5 secondes maximum
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                console.warn('Loading screen timeout - forcing hide');
                hideLoadingScreen();
            }
        }, 5000);

        // Afficher le badge démo si ouvert en mode file://
        if (window.location.protocol === 'file:') {
            window.addEventListener('DOMContentLoaded', () => {
                const demoBadge = document.getElementById('demo-badge');
                if (demoBadge) demoBadge.classList.remove('hidden');
            });
        }

        // Animations de page (appelées après masquage du loading screen)
        function initAnimations() {
            // Animer les cartes de la page courante dans #app
            gsap.from('#app .card-glass-pro', {
                opacity: 0,
                y: 50,
                duration: 0.8,
                stagger: 0.1,
                ease: 'power3.out',
                clearProps: 'opacity,transform'
            });

            // Compteurs animés
            document.querySelectorAll('[data-count]').forEach(counter => {
                const target = parseInt(counter.getAttribute('data-count'));
                gsap.to(counter, {
                    innerHTML: target,
                    duration: 2,
                    snap: { innerHTML: 1 },
                    ease: 'power2.out',
                    scrollTrigger: { trigger: counter, start: 'top 80%' }
                });
            });

            // Scroll reveal
            gsap.utils.toArray('.reveal').forEach(element => {
                gsap.from(element, {
                    scrollTrigger: {
                        trigger: element,
                        start: 'top 85%',
                        toggleActions: 'play none none reverse'
                    },
                    opacity: 0,
                    y: 30,
                    duration: 0.8,
                    ease: 'power2.out'
                });
            });
        }
    </script>

    <!-- Base Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Pro Styles -->
    <link rel="stylesheet" href="style-pro.css">
    <link rel="stylesheet" href="style-pro-fixes.css">

    <style>
        /* Additional custom styles */
        .hero-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--color-text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .feature-icon-pro {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-2xl);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-gold) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: var(--space-4);
            box-shadow: 0 8px 20px rgba(45, 80, 22, 0.3);
        }

        .ayah-display {
            font-family: var(--font-arabic);
            font-size: 2rem;
            line-height: 2.5;
            text-align: center;
            padding: var(--space-8);
            background: linear-gradient(135deg, rgba(45, 80, 22, 0.05) 0%, rgba(212, 165, 116, 0.05) 100%);
            border-radius: var(--radius-3xl);
            border: 1px solid rgba(45, 80, 22, 0.1);
        }

        .memorization-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4);
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            margin-bottom: var(--space-3);
            transition: all var(--transition-base);
            border: 1px solid var(--color-border);
        }

        .memorization-item:hover {
            transform: translateX(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-primary);
        }

        .status-badge {
            width: 12px;
            height: 12px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }

        .status-strong { background: var(--color-success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .status-weak { background: var(--color-warning); box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .status-new { background: var(--color-info); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--color-bg, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        .loading-screen.hidden {
            display: none !important;
        }

        .loading-logo {
            font-size: 4rem;
            margin-bottom: var(--space-4);
            animation: pulse 2s ease-in-out infinite;
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: var(--color-gray-200);
            border-radius: var(--radius-full);
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-gold));
            width: 0%;
            border-radius: var(--radius-full);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-logo">🕌</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
    </div>

    <!-- Aurora Background -->
    <div class="aurora-bg"></div>

    <!-- Particles -->
    <div class="particles-container" id="particles"></div>
    <script>
        // Générer les particules flottantes
        (function() {
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = (15 + Math.random() * 10) + 's';
                const size = (3 + Math.random() * 6) + 'px';
                p.style.width = size;
                p.style.height = size;
                container.appendChild(p);
            }
        })();
    </script>

    <!-- Header -->
    <header class="header-pro header-glass">
        <div class="container-pro">
            <div class="flex-pro" style="justify-content: space-between;">
                <div class="flex-pro" style="gap: var(--space-3);">
                    <h1 class="gradient-text" style="font-size: 1.5rem; font-weight: 700;">🕌 مراجعة القرآن</h1>
                    <span id="demo-badge" class="badge badge-warning hidden" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white;">🎮 MODE DÉMO</span>
                </div>
                <nav class="flex-pro" style="gap: var(--space-2);">
                    <a href="#" class="nav-link-pro active" data-page="home">الرئيسية</a>
                    <a href="#" class="nav-link-pro" data-page="memorization">الحفظ</a>
                    <a href="#" class="nav-link-pro" data-page="ward">الورد</a>
                    <a href="#" class="nav-link-pro" data-page="progress">التقدم</a>
                    <a href="#" class="nav-link-pro" data-page="competition">🏆</a>
                    <a href="#" class="nav-link-pro" data-page="hifz">🎭</a>
                    <!-- لينك مهامي — visible uniquement pour les étudiants connectés -->
                    <a href="#" class="nav-link-pro nav-student-only" data-page="mytasks" style="display:none;">📝 مهامي</a>
                    <!-- لينك لوحة المعلم — visible uniquement pour les enseignants connectés -->
                    <a href="#" class="nav-link-pro nav-teacher-only" data-page="teacher" style="display:none;">👨‍🏫 المعلم</a>
                    <button id="theme-toggle" class="btn btn-icon" style="margin-right: var(--space-4);">
                        <span id="theme-icon">🌙</span>
                    </button>
                    <div id="auth-nav">
                        <button id="auth-login-btn" class="btn btn-glow btn-sm" onclick="showAuthModal()">
                            <span>👤</span>
                            دخول
                        </button>
                        <div id="auth-user-info" class="hidden flex-pro" style="gap: var(--space-2);">
                            <span id="auth-username" class="badge badge-primary"></span>
                            <button class="btn btn-outline-glow btn-sm" onclick="QuranReview.logout()">خروج</button>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Audio Element (requis par AudioManager) -->
    <audio id="audio-element" preload="none"></audio>

    <!-- Conteneur principal des pages -->
    <main id="app" class="main-content-pro"></main>

    <!-- Conteneur des modaux -->
    <div id="modals"></div>

    <script>
        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .catch(err => console.log('SW registration failed'));
        }
    </script>

    <!-- ES Module entry point -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
